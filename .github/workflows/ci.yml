# ============================================================
#  CI Pipeline - EdTech Platform
#  Runs on every Pull Request targeting: main, develop, feature/*
#
#  Jobs:
#    1. frontend-quality   → ESLint · Prettier · Unit Tests
#    2. backend-quality    → ESLint · TypeScript · Prettier · Unit Tests
#    3. security-audit     → npm audit · Trivy · Gitleaks
#    4. build-verification → React build · Node/TS build
#    5. database-validation→ prisma generate · prisma validate · migrate
#    6. ci-summary         → Gate – fails if any job above failed
# ============================================================

name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"
  push:
    branches:
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x"

# ──────────────────────────────────────────────────────────────
# JOB 1 - Frontend: Lint · Prettier · Unit Tests
# ──────────────────────────────────────────────────────────────
jobs:
  frontend-quality:
    name: "Frontend - Lint, Format & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        # Fails the job on any ESLint error or warning (--max-warnings 0
        # should be set in the lint script for zero-warning policy)

      - name: Validate Prettier formatting
        run: npm run format:check
        # Add "format:check": "prettier --check \"src/**/*.{js,jsx,ts,tsx,css}\"" to package.json

      - name: Run unit tests with coverage
        run: npm test -- --coverage --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Upload frontend test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: client/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # JOB 2 - Backend: Lint · TypeScript · Prettier · Unit Tests
  # ──────────────────────────────────────────────────────────────
  backend-quality:
    name: "Backend - Lint, TypeScript & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: edtech_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check (no emit)
        run: npm run type-check
        # Add "type-check": "tsc --noEmit" to package.json scripts

      - name: Validate Prettier formatting
        run: npm run format:check

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/edtech_ci

      - name: Run unit tests with coverage
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/edtech_ci
          JWT_SECRET: ci-test-jwt-secret-not-used-in-production
          RAZORPAY_KEY_ID: test_key
          RAZORPAY_SECRET: test_secret

      - name: Upload backend test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-${{ github.run_id }}
          path: server/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # JOB 3 - Security: npm audit · Trivy · Gitleaks
  # ──────────────────────────────────────────────────────────────
  security-audit:
    name: "Security Audit"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for Gitleaks full history scan

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit frontend dependencies
        working-directory: client
        run: npm audit --audit-level=high
        # Reports vulnerabilities at HIGH or CRITICAL severity level

      - name: Audit backend dependencies
        working-directory: server
        run: npm audit --audit-level=high

      - name: Run Trivy filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true

      - name: Secret scanning with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for org-level scans;
          # for public/private personal repos the token is sufficient

      - name: Generate security report on failure
        if: failure()
        run: |
          echo "## Security Audit Failed" >> $GITHUB_STEP_SUMMARY
          echo "One or more security checks did not pass." >> $GITHUB_STEP_SUMMARY
          echo "Review the job logs above for detailed findings." >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────
  # JOB 4 - Build Verification: Frontend + Backend
  # ──────────────────────────────────────────────────────────────
  build-verification:
    name: "Build Verification"
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Frontend build ──────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend (React)
        working-directory: client
        run: npm run build
        env:
          CI: false
          # CI=false prevents treating warnings as errors during build
          # Set REACT_APP_* vars here if needed for build-time injection
          REACT_APP_API_URL: https://api.example.com
          REACT_APP_RAZORPAY_KEY_ID: test_key_placeholder

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.run_id }}
          path: client/build/
          retention-days: 3

      # ── Backend build ────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Build backend (TypeScript → JavaScript)
        working-directory: server
        run: npm run build
        # Expects "build": "tsc" in server/package.json

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-${{ github.run_id }}
          path: server/dist/
          retention-days: 3

  # ──────────────────────────────────────────────────────────────
  # JOB 5 - Database Validation: Prisma schema + migrations
  # ──────────────────────────────────────────────────────────────
  database-validation:
    name: "Database Schema Validation"
    runs-on: ubuntu-latest
    needs: [backend-quality]
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: edtech_schema_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/edtech_schema_test

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/edtech_schema_test
        # Fails if prisma/schema.prisma contains syntax or logical errors

      - name: Run migrations on ephemeral test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/edtech_schema_test
        # Ensures all migration files apply cleanly from scratch

      - name: Report schema failure
        if: failure()
        run: |
          echo "## Database Schema Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "Prisma schema errors detected. Run \`npx prisma validate\` locally." >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────
  # JOB 6 - CI Summary Gate (all jobs must pass)
  # ──────────────────────────────────────────────────────────────
  ci-summary:
    name: "CI Gate - All Checks Must Pass"
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - backend-quality
      - security-audit
      - build-verification
      - database-validation
    if: always()

    steps:
      - name: Evaluate all job results
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Quality  | ${{ needs.frontend-quality.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Quality   | ${{ needs.backend-quality.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit    | ${{ needs.security-audit.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Verification| ${{ needs.build-verification.result }}|" >> $GITHUB_STEP_SUMMARY
          echo "| Database Validation| ${{ needs.database-validation.result }}|" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          for result in \
            "${{ needs.frontend-quality.result }}" \
            "${{ needs.backend-quality.result }}" \
            "${{ needs.security-audit.result }}" \
            "${{ needs.build-verification.result }}" \
            "${{ needs.database-validation.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more CI checks failed. PR cannot be merged."
            exit 1
          fi
          echo "All CI checks passed. PR is ready for review."

